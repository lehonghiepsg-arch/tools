<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame Snapper — Video Screenshot Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8ff5a;
    --accent2: #5affd4;
    --accent3: #ff5a8e;
    --text: #f0f0f8;
    --muted: #6a6a88;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,90,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,90,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }

  header p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 100%, rgba(232,255,90,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #111118;
  }

  .drop-zone.drag-over { transform: scale(1.01); }

  .drop-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .drop-zone h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .drop-zone p {
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  .browse-btn {
    display: inline-block;
    margin-top: 20px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .browse-btn:hover { opacity: 0.85; }

  #fileInput { display: none; }

  /* Video + controls layout */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    margin-top: 24px;
  }

  @media (max-width: 820px) {
    .main-layout { grid-template-columns: 1fr; }
  }

  /* Video panel */
  .video-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .video-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }

  #videoContainer {
    position: relative;
    background: #000;
  }

  video {
    width: 100%;
    display: block;
    max-height: 420px;
    object-fit: contain;
    background: #000;
  }

  /* Scrubber area */
  .scrubber-area {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }

  .time-display {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type=range] {
    width: 100%;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .video-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 12px;
  }

  .ctrl-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
  }

  .ctrl-btn:hover {
    background: var(--border);
    border-color: var(--accent);
  }

  .snap-now-btn {
    margin-left: auto;
    background: var(--accent3);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex; align-items: center; gap: 6px;
  }

  .snap-now-btn:hover { opacity: 0.85; }
  .snap-now-btn:active { transform: scale(0.96); }

  /* Settings panel */
  .settings-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body { padding: 16px; }

  .field {
    margin-bottom: 16px;
  }

  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .field label span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    font-weight: 400;
    margin-left: 6px;
  }

  .field input[type=number],
  .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input[type=number]:focus,
  .field select:focus { border-color: var(--accent); }

  .field select option { background: var(--surface2); }

  /* Mode toggle */
  .mode-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .mode-tab {
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .mode-tab.active {
    background: rgba(232,255,90,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Extract button */
  .extract-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #0a0a0f;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.3px;
  }

  .extract-btn:hover { opacity: 0.88; }
  .extract-btn:active { transform: scale(0.97); }
  .extract-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Progress */
  .progress-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-top: 12px;
    display: none;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.1s;
    width: 0%;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-align: center;
    display: none;
  }

  /* Results */
  .results-section {
    margin-top: 32px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-header h3 {
    font-size: 16px;
    font-weight: 700;
  }

  .results-header h3 span {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    font-weight: 400;
    margin-left: 8px;
  }

  .dl-all-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }

  .dl-all-btn:hover {
    border-color: var(--accent2);
    background: rgba(90,255,212,0.08);
  }

  .frames-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .frame-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .frame-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  .frame-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }

  .frame-footer {
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .frame-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .dl-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .dl-btn:hover { background: rgba(232,255,90,0.12); }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 24px;
    display: none;
  }

  .lightbox.show { display: flex; }

  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: 0 0 80px rgba(232,255,90,0.2);
  }

  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    font-size: 28px;
    color: var(--text);
    cursor: pointer;
    background: none; border: none;
    line-height: 1;
  }

  /* Hidden canvas */
  #captureCanvas { display: none; }

  .empty-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  /* Tooltip-like tag */
  .info-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(90,255,212,0.1);
    border: 1px solid rgba(90,255,212,0.2);
    color: var(--accent2);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }

  /* Filename prefix */
  .field input[type=text] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input[type=text]:focus { border-color: var(--accent); }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo-icon">🎬</div>
    <div>
      <h1>Frame<span>Snapper</span></h1>
      <p>// chụp ảnh từ video · không cần upload lên server</p>
    </div>
    <div class="badge">100% client-side</div>
  </header>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">📹</span>
    <h2>Kéo thả video vào đây</h2>
    <p>Hỗ trợ MP4, WebM, MOV, AVI, MKV...</p>
    <button class="browse-btn" onclick="document.getElementById('fileInput').click()">Chọn file video</button>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <!-- Main layout (hidden until video loaded) -->
  <div class="main-layout" id="mainLayout" style="display:none">

    <!-- Left: Video -->
    <div>
      <div class="video-panel">
        <div class="video-header">
          <div class="dot"></div>
          <span id="videoName">video.mp4</span>
          &nbsp;·&nbsp;
          <span id="videoInfo">–</span>
        </div>
        <div id="videoContainer">
          <video id="video" controls></video>
        </div>
        <div class="scrubber-area">
          <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
          <input type="range" id="scrubber" min="0" max="100" value="0" step="0.01">
          <div class="video-controls">
            <button class="ctrl-btn" id="prevFrameBtn" title="Lùi 1 giây">⏮ -1s</button>
            <button class="ctrl-btn" id="playBtn">▶</button>
            <button class="ctrl-btn" id="nextFrameBtn" title="Tiến 1 giây">+1s ⏭</button>
            <button class="snap-now-btn" id="snapNowBtn">📸 Chụp frame này</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Settings -->
    <div class="settings-panel">

      <!-- Mode -->
      <div class="card">
        <div class="card-header">⚙ Chế độ trích xuất</div>
        <div class="card-body">
          <div class="mode-tabs">
            <div class="mode-tab active" data-mode="count" onclick="setMode('count', this)">Theo số lượng</div>
            <div class="mode-tab" data-mode="interval" onclick="setMode('interval', this)">Theo khoảng thời gian</div>
          </div>
        </div>
      </div>

      <!-- Options -->
      <div class="card">
        <div class="card-header">🎛 Tùy chọn</div>
        <div class="card-body">

          <!-- Count mode -->
          <div id="countOptions">
            <div class="field">
              <label>Số lượng ảnh<span id="countVal">10</span></label>
              <input type="range" id="frameCount" min="1" max="100" value="10"
                oninput="document.getElementById('countVal').textContent=this.value">
            </div>
          </div>

          <!-- Interval mode -->
          <div id="intervalOptions" style="display:none">
            <div class="field">
              <label>Chụp mỗi <span id="intervalVal">2</span> giây</label>
              <input type="range" id="frameInterval" min="1" max="60" value="2" step="0.5"
                oninput="document.getElementById('intervalVal').textContent=this.value">
            </div>
          </div>

          <!-- Time range -->
          <div class="field">
            <label>Bắt đầu từ (giây) <span id="startVal">0</span>s</label>
            <input type="range" id="startTime" min="0" max="100" value="0" step="0.5"
              oninput="syncRange()">
          </div>
          <div class="field">
            <label>Đến (giây) <span id="endVal">–</span>s</label>
            <input type="range" id="endTime" min="0" max="100" value="100" step="0.5"
              oninput="syncRange()">
          </div>

          <!-- Quality -->
          <div class="field">
            <label>Chất lượng ảnh</label>
            <select id="quality">
              <option value="1.0">Cao nhất (PNG-like)</option>
              <option value="0.95" selected>Cao (JPEG 95%)</option>
              <option value="0.85">Trung bình (JPEG 85%)</option>
              <option value="0.7">Nhỏ (JPEG 70%)</option>
            </select>
          </div>

          <!-- Format -->
          <div class="field">
            <label>Định dạng</label>
            <select id="format">
              <option value="image/jpeg">JPEG</option>
              <option value="image/png">PNG (lossless)</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>

          <!-- Prefix -->
          <div class="field">
            <label>Tên file (prefix)</label>
            <input type="text" id="prefix" value="frame" placeholder="frame">
          </div>

        </div>
      </div>

      <!-- Extract -->
      <button class="extract-btn" id="extractBtn" onclick="extractFrames()">
        🎞 Trích xuất tất cả frames
      </button>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel"></div>

    </div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection" style="display:none">
    <div class="results-header">
      <h3>Kết quả <span id="resultCount"></span></h3>
      <button class="dl-all-btn" onclick="downloadAll()">⬇ Tải tất cả (ZIP)</button>
    </div>
    <div class="frames-grid" id="framesGrid"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<canvas id="captureCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const video = document.getElementById('video');
const scrubber = document.getElementById('scrubber');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const canvas = document.getElementById('captureCanvas');
const ctx = canvas.getContext('2d');

let capturedFrames = [];
let currentMode = 'count';
let videoDuration = 0;

// ── Drag & Drop ──────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) loadVideo(file);
});
fileInput.addEventListener('change', e => loadVideo(e.target.files[0]));

function loadVideo(file) {
  const url = URL.createObjectURL(file);
  video.src = url;
  document.getElementById('videoName').textContent = file.name;
  document.getElementById('mainLayout').style.display = 'grid';
  dropZone.style.display = 'none';
  capturedFrames = [];
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('framesGrid').innerHTML = '';
}

video.addEventListener('loadedmetadata', () => {
  videoDuration = video.duration;
  scrubber.max = videoDuration;
  document.getElementById('duration').textContent = formatTime(videoDuration);
  document.getElementById('endVal').textContent = videoDuration.toFixed(1);
  const w = video.videoWidth, h = video.videoHeight;
  document.getElementById('videoInfo').textContent = `${w}×${h} · ${formatTime(videoDuration)}`;
  // Sync range sliders
  ['startTime','endTime'].forEach(id => {
    const el = document.getElementById(id);
    el.max = videoDuration;
    if (id === 'endTime') el.value = videoDuration;
  });
  syncRange();
});

video.addEventListener('timeupdate', () => {
  scrubber.value = video.currentTime;
  document.getElementById('currentTime').textContent = formatTime(video.currentTime);
});

scrubber.addEventListener('input', () => { video.currentTime = scrubber.value; });

document.getElementById('playBtn').addEventListener('click', () => {
  if (video.paused) { video.play(); document.getElementById('playBtn').textContent = '⏸'; }
  else { video.pause(); document.getElementById('playBtn').textContent = '▶'; }
});

video.addEventListener('ended', () => { document.getElementById('playBtn').textContent = '▶'; });

document.getElementById('prevFrameBtn').addEventListener('click', () => { video.currentTime = Math.max(0, video.currentTime - 1); });
document.getElementById('nextFrameBtn').addEventListener('click', () => { video.currentTime = Math.min(videoDuration, video.currentTime + 1); });

// Snap current frame
document.getElementById('snapNowBtn').addEventListener('click', () => {
  const dataURL = captureFrame();
  const t = video.currentTime;
  addFrameCard(dataURL, t, 'snap');
  capturedFrames.push({ dataURL, time: t });
  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('resultCount').textContent = `(${capturedFrames.length})`;
});

// ── Mode ──────────────────────────────────────────────────
function setMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('countOptions').style.display = mode === 'count' ? 'block' : 'none';
  document.getElementById('intervalOptions').style.display = mode === 'interval' ? 'block' : 'none';
}

function syncRange() {
  const s = parseFloat(document.getElementById('startTime').value);
  const e = parseFloat(document.getElementById('endTime').value);
  document.getElementById('startVal').textContent = s.toFixed(1);
  document.getElementById('endVal').textContent = Math.max(s, e).toFixed(1);
}

// ── Capture ──────────────────────────────────────────────
function captureFrame() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const fmt = document.getElementById('format').value;
  const q = parseFloat(document.getElementById('quality').value);
  return canvas.toDataURL(fmt, q);
}

async function extractFrames() {
  if (!video.src) return;
  const startT = parseFloat(document.getElementById('startTime').value);
  const endT   = parseFloat(document.getElementById('endTime').value);
  const clampedEnd = Math.min(endT, videoDuration);
  const rangeLen = clampedEnd - startT;
  if (rangeLen <= 0) return alert('Khoảng thời gian không hợp lệ!');

  let timestamps = [];
  if (currentMode === 'count') {
    const n = parseInt(document.getElementById('frameCount').value);
    for (let i = 0; i < n; i++) timestamps.push(startT + (rangeLen / (n - 1 || 1)) * i);
  } else {
    const interval = parseFloat(document.getElementById('frameInterval').value);
    for (let t = startT; t <= clampedEnd; t += interval) timestamps.push(t);
  }

  capturedFrames = [];
  document.getElementById('framesGrid').innerHTML = '';
  document.getElementById('resultsSection').style.display = 'none';

  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Đang trích xuất...';

  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const progressLabel = document.getElementById('progressLabel');
  progressWrap.style.display = 'block';
  progressLabel.style.display = 'block';

  video.pause();
  document.getElementById('playBtn').textContent = '▶';

  for (let i = 0; i < timestamps.length; i++) {
    const t = timestamps[i];
    await seekTo(t);
    const dataURL = captureFrame();
    capturedFrames.push({ dataURL, time: t });
    addFrameCard(dataURL, t, i);
    const pct = Math.round(((i + 1) / timestamps.length) * 100);
    progressBar.style.width = pct + '%';
    progressLabel.textContent = `Đang xử lý ${i + 1}/${timestamps.length} frame...`;
  }

  btn.disabled = false;
  btn.textContent = '🎞 Trích xuất tất cả frames';
  progressLabel.textContent = `✅ Hoàn thành! ${capturedFrames.length} frames`;
  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('resultCount').textContent = `(${capturedFrames.length})`;
}

function seekTo(t) {
  return new Promise(resolve => {
    video.currentTime = t;
    const handler = () => { video.removeEventListener('seeked', handler); resolve(); };
    video.addEventListener('seeked', handler);
  });
}

function addFrameCard(dataURL, t, idx) {
  const grid = document.getElementById('framesGrid');
  const card = document.createElement('div');
  card.className = 'frame-card';
  const fmt = document.getElementById('format').value;
  const ext = fmt === 'image/png' ? 'png' : fmt === 'image/webp' ? 'webp' : 'jpg';
  const prefix = document.getElementById('prefix').value || 'frame';
  const filename = `${prefix}_${String(typeof idx === 'number' ? idx+1 : capturedFrames.length).padStart(4,'0')}_${formatTimeFile(t)}.${ext}`;

  card.innerHTML = `
    <img class="frame-img" src="${dataURL}" alt="Frame ${formatTime(t)}" onclick="openLightbox(this.src)">
    <div class="frame-footer">
      <span class="frame-time">${formatTime(t)}</span>
      <button class="dl-btn" onclick="downloadFrame('${dataURL}','${filename}')" title="Tải xuống">⬇</button>
    </div>
  `;
  grid.appendChild(card);
}

// ── Download ──────────────────────────────────────────────
function downloadFrame(dataURL, filename) {
  const a = document.createElement('a');
  a.href = dataURL; a.download = filename; a.click();
}

async function downloadAll() {
  if (!capturedFrames.length) return;
  const zip = new JSZip();
  const prefix = document.getElementById('prefix').value || 'frame';
  const fmt = document.getElementById('format').value;
  const ext = fmt === 'image/png' ? 'png' : fmt === 'image/webp' ? 'webp' : 'jpg';

  capturedFrames.forEach((f, i) => {
    const base64 = f.dataURL.split(',')[1];
    const fn = `${prefix}_${String(i+1).padStart(4,'0')}_${formatTimeFile(f.time)}.${ext}`;
    zip.file(fn, base64, { base64: true });
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${prefix}_frames.zip`;
  a.click();
}

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// ── Helpers ──────────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function formatTimeFile(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(2).replace('.','s');
  return `${m}m${sec}`;
}
</script>
